name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build OpenNext
        env:
          CI: true
          NEXT_TELEMETRY_DISABLED: '1'
          CLOUDFLARE_AUTH_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          rm -rf .next .open-next
          npx opennextjs-cloudflare build

      - name: Deploy to Cloudflare Workers
        run: |
          # Temporarily rename worker.ts to bypass opennextjs detection
          # This allows direct wrangler deploy without the CI-incompatible proxy
          cp worker.ts worker.ts.bak
          echo 'export default { fetch: () => new Response("ok") }' > worker.ts
          CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }} \
          CLOUDFLARE_AUTH_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }} \
          ./node_modules/.bin/wrangler deploy --name qiaomu-blog-opensource
          mv worker.ts.bak worker.ts
