name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build OpenNext
        env:
          CI: true
          NEXT_TELEMETRY_DISABLED: '1'
          CLOUDFLARE_AUTH_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          rm -rf .next .open-next
          npx opennextjs-cloudflare build

      - name: Deploy to Cloudflare Workers
        run: |
          # Patch opennextjs helpers to skip proxy session check in CI
          node -e "
            const fs = require('fs');
            const path = 'node_modules/@opennextjs/cloudflare/dist/cli/commands/utils/helpers.js';
            if (fs.existsSync(path)) {
              let content = fs.readFileSync(path, 'utf8');
              // Skip the proxy session check which fails in CI
              content = content.replace(
                'async function getEnvFromPlatformProxy',
                'async function getEnvFromPlatformProxy_skip'
              );
              fs.writeFileSync(path, content);
              console.log('Patched helpers.js to skip proxy check');
            }
          "
          CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }} \
          CLOUDFLARE_AUTH_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }} \
          ./node_modules/.bin/wrangler deploy --name qiaomu-blog-opensource
