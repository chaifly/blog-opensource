name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build OpenNext
        env:
          CI: true
          NEXT_TELEMETRY_DISABLED: '1'
          CLOUDFLARE_AUTH_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          rm -rf .next .open-next
          npx opennextjs-cloudflare build

      - name: Deploy to Cloudflare Workers
        run: |
          # Use global wrangler to bypass opennextjs wrapper
          npm install -g wrangler@4.84.1
          CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }} \
          CLOUDFLARE_AUTH_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }} \
          npx wrangler deploy --name qiaomu-blog-opensource
