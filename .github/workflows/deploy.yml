name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build OpenNext
        env:
          CI: true
          NEXT_TELEMETRY_DISABLED: '1'
          CLOUDFLARE_AUTH_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          rm -rf .next .open-next
          npx opennextjs-cloudflare build

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_AUTH_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Patch helpers.js to return null from getEnvFromPlatformProxy (skip proxy in CI)
          node -e "
            const fs = require('fs');
            const path = 'node_modules/@opennextjs/cloudflare/dist/cli/commands/utils/helpers.js';
            if (fs.existsSync(path)) {
              let content = fs.readFileSync(path, 'utf8');
              // Replace the function body to return null (skip proxy)
              content = content.replace(
                /export async function getEnvFromPlatformProxy\(\)[^{]*\{[\s\S]*?\}/,
                'export async function getEnvFromPlatformProxy() { return null; }'
              );
              fs.writeFileSync(path, content);
              console.log('Patched helpers.js');
            }
          "
          ./node_modules/.bin/wrangler deploy --name qiaomu-blog-opensource
